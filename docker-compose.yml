services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d","${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - db-net



  app:
    build: .
    container_name: e-commerce
    env_file:
      .env
    environment:
      SPRING_PROFILES_ACTIVE: container
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db-net
      - api-net


volumes:
  postgres-data:
    driver: local
  pgadmin-data:

networks:
  db-net:
    driver: bridge
    internal: true
  api-net:
    driver: bridge