openapi: 3.1.0
info:
  title: OpenAPI Specification
  description: OpenAPI Doc for spring E-Commerce project
  contact:
    name: E-Commerce Backend Platform
    email: abdallasamirkhalifa@gmail.com
  version: "1.0"
servers:
- url: http://localhost:8080
  description: Generated server url
security:
- bearerAuth: []
paths:
  /api/v1/customer/address/{addressId}:
    get:
      tags:
      - customer-address-controller
      operationId: getAddressById
      parameters:
      - name: addressId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelAddressResponse"
    put:
      tags:
      - customer-address-controller
      operationId: updateAddress
      parameters:
      - name: addressId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelAddressResponse"
    delete:
      tags:
      - customer-address-controller
      operationId: deleteAddress
      parameters:
      - name: addressId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "204":
          description: No Content
  /api/v1/products:
    post:
      tags:
      - product-controller
      operationId: createNewProduct
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelProductResponse"
  /api/v1/customer/orders:
    post:
      tags:
      - order-controller
      operationId: checkout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
  /api/v1/customer/cart/addToCart:
    post:
      tags:
      - cart-controller
      operationId: addToCart
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelCartResponse"
  /api/v1/customer/address/create:
    post:
      tags:
      - customer-address-controller
      operationId: createNewAddress
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelAddressResponse"
  /api/v1/categories:
    post:
      tags:
      - category-controller
      operationId: createNewCategory
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelCategoryResponse"
  /api/v1/auth/register:
    post:
      tags:
      - auth-controller
      operationId: registerNewCustomer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationRequest"
        required: true
      responses:
        "200":
          description: OK
      security: []
  /api/v1/auth/login:
    post:
      tags:
      - auth-controller
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
      security: []
  /api/v1/products/update/{prodId}:
    patch:
      tags:
      - product-controller
      operationId: updateProductById
      parameters:
      - name: prodId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelProductResponse"
  /api/v1/customer/cart/{prodId}:
    patch:
      tags:
      - cart-controller
      operationId: removeItemFromCart
      parameters:
      - name: prodId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelCartResponse"
  /api/v1/customer/cart/increase:
    patch:
      tags:
      - cart-controller
      operationId: increaseCartItem
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelCartResponse"
  /api/v1/customer/cart/decrease:
    patch:
      tags:
      - cart-controller
      operationId: decreaseCartItem
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelCartResponse"
  /api/v1/categories/{catId}:
    patch:
      tags:
      - category-controller
      operationId: updateCategoryById
      parameters:
      - name: catId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelCategoryResponse"
  /api/v1/products/{prodId}:
    get:
      tags:
      - product-controller
      operationId: getProductById
      parameters:
      - name: prodId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelProductResponse"
      security: []
  /api/v1/products/all:
    get:
      tags:
      - product-controller
      operationId: getAllProducts
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CollectionModelEntityModelProductResponse"
      security: []
  /api/v1/products/allByPage:
    get:
      tags:
      - product-controller
      operationId: getAllProductsByPage
      parameters:
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
          default: id
      - name: sortOrder
        in: query
        required: false
        schema:
          type: string
          default: ASC
      - name: page
        in: query
        required: true
        schema:
          type: integer
          format: int32
      - name: pageSize
        in: query
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CollectionModelEntityModelProductResponse"
      security: []
  /api/v1/customer/cart:
    get:
      tags:
      - cart-controller
      operationId: getMyCart
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelCartResponse"
  /api/v1/customer/address/all:
    get:
      tags:
      - customer-address-controller
      operationId: getAllAddresses
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CollectionModelEntityModelAddressResponse"
  /api/v1/categories/{id}:
    get:
      tags:
      - category-controller
      operationId: getCategoryById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EntityModelCategoryResponse"
      security: []
  /api/v1/categories/all:
    get:
      tags:
      - category-controller
      operationId: getAllCategories
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CollectionModelEntityModelCategoryResponse"
      security: []
  /api/v1/categories/allByPage:
    get:
      tags:
      - category-controller
      operationId: getAllCategoriesByPage
      parameters:
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
          default: id
      - name: sortOrder
        in: query
        required: false
        schema:
          type: string
          default: ASC
      - name: page
        in: query
        required: true
        schema:
          type: integer
          format: int32
      - name: pageSize
        in: query
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CollectionModelEntityModelCategoryResponse"
      security: []
  /api/v1/products/delete/{prodId}:
    delete:
      tags:
      - product-controller
      operationId: deleteProductById
      parameters:
      - name: prodId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "204":
          description: No Content
  /api/v1/customer/cart/clear:
    delete:
      tags:
      - cart-controller
      operationId: clearCart
      responses:
        "200":
          description: OK
  /api/v1/categories/delete/{catId}:
    delete:
      tags:
      - category-controller
      operationId: deleteCategoryById
      parameters:
      - name: catId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "204":
          description: No Content
components:
  schemas:
    AddressRequest:
      type: object
      properties:
        label:
          type: string
          maxLength: 20
          minLength: 0
        city:
          type: string
          maxLength: 20
          minLength: 0
        street:
          type: string
          maxLength: 100
          minLength: 0
        notes:
          type: string
          maxLength: 250
          minLength: 0
      required:
      - city
      - label
      - street
    EntityModelAddressResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
        label:
          type: string
        city:
          type: string
        street:
          type: string
        notes:
          type: string
        _links:
          $ref: "#/components/schemas/Links"
    ProductRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 150
          minLength: 10
        description:
          type: string
          maxLength: 500
          minLength: 10
        price:
          type: number
        isAvailable:
          type: boolean
        categoryId:
          type: integer
          format: int32
      required:
      - categoryId
      - description
      - isAvailable
      - name
    EntityModelProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        description:
          type: string
        price:
          type: number
        available:
          type: boolean
        _links:
          $ref: "#/components/schemas/Links"
    OrderRequest:
      type: object
      properties:
        addressId:
          type: integer
          format: int32
        orderNote:
          type: string
          maxLength: 500
          minLength: 0
      required:
      - addressId
    OrderItemResponse:
      type: object
      properties:
        productId:
          type: integer
          format: int32
        productName:
          type: string
        quantity:
          type: integer
          format: int32
        priceAtPurchase:
          type: number
        subtotal:
          type: number
    OrderResponse:
      type: object
      properties:
        orderId:
          type: integer
          format: int32
        orderDate:
          type: string
          format: date-time
        totalAmount:
          type: number
        note:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemResponse"
    AddToCartRequest:
      type: object
      properties:
        productId:
          type: integer
          format: int32
        quantity:
          type: integer
          format: int32
      required:
      - productId
      - quantity
    CartItemResponse:
      type: object
      properties:
        productId:
          type: integer
          format: int32
        productName:
          type: string
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: number
        subTotal:
          type: number
    EntityModelCartResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItemResponse"
        cartTotal:
          type: number
        _links:
          $ref: "#/components/schemas/Links"
    CategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required:
      - name
    EntityModelCategoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        _links:
          $ref: "#/components/schemas/Links"
    RegistrationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        username:
          type: string
          maxLength: 50
          minLength: 10
        password:
          type: string
          maxLength: 255
          minLength: 8
        firstName:
          type: string
          maxLength: 100
          minLength: 5
        lastName:
          type: string
          minLength: 1
      required:
      - email
      - firstName
      - lastName
      - password
      - username
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
      - password
      - username
    UpdateCartItemRequest:
      type: object
      properties:
        productId:
          type: integer
          format: int32
        quantity:
          type: integer
          format: int32
      required:
      - productId
      - quantity
    CollectionModelEntityModelProductResponse:
      type: object
      properties:
        _embedded:
          type: object
          properties:
            productResponseList:
              type: array
              items:
                $ref: "#/components/schemas/EntityModelProductResponse"
        _links:
          $ref: "#/components/schemas/Links"
    CollectionModelEntityModelAddressResponse:
      type: object
      properties:
        _embedded:
          type: object
          properties:
            addressResponseList:
              type: array
              items:
                $ref: "#/components/schemas/EntityModelAddressResponse"
        _links:
          $ref: "#/components/schemas/Links"
    CollectionModelEntityModelCategoryResponse:
      type: object
      properties:
        _embedded:
          type: object
          properties:
            categoryResponseList:
              type: array
              items:
                $ref: "#/components/schemas/EntityModelCategoryResponse"
        _links:
          $ref: "#/components/schemas/Links"
    Link:
      type: object
      properties:
        href:
          type: string
        hreflang:
          type: string
        title:
          type: string
        type:
          type: string
        deprecation:
          type: string
        profile:
          type: string
        name:
          type: string
        templated:
          type: boolean
    Links:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/Link"
  securitySchemes:
    bearerAuth:
      type: http
      description: JWT auth description
      in: header
      scheme: bearer
      bearerFormat: JWT
